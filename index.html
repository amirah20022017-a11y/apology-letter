<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Letter For You</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%);
            font-family: 'Georgia', serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .flowers {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 0;
        }

        .flower {
            position: absolute;
            font-size: 24px;
            opacity: 0.6;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .envelope-wrapper {
            perspective: 1000px;
            position: relative;
            z-index: 1;
            margin-bottom: 60px;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .envelope {
            width: 80vw;
            max-width: 450px;
            aspect-ratio: 450 / 300;
            background: white;
            border: 4px solid #d81b60;
            border-radius: 15px;
            position: relative;
            cursor: pointer;
            box-shadow: 0 15px 50px rgba(236, 64, 122, 0.4);
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .envelope:hover {
            transform: translateY(-15px) scale(1.05);
            box-shadow: 0 20px 60px rgba(236, 64, 122, 0.6);
        }

        /* Envelope body */
        .envelope-body {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #fff9e6 0%, #ffe6f0 100%);
            border-radius: 15px;
        }

        /* Left triangle flap */
        .envelope-flap-left {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 25vw solid transparent;
            border-top: calc(25vw * 0.667) solid #ec407a;
            max-width: 225px;
            max-height: 150px;
            transform-origin: left top;
            transition: all 0.6s ease;
            cursor: pointer;
        }

        /* Right triangle flap */
        .envelope-flap-right {
            position: absolute;
            top: 0;
            right: 0;
            width: 0;
            height: 0;
            border-right: 25vw solid transparent;
            border-top: calc(25vw * 0.667) solid #d81b60;
            max-width: 225px;
            max-height: 150px;
            transform-origin: right top;
            transition: all 0.6s ease;
            cursor: pointer;
        }

        .envelope.opened .envelope-flap-left {
            transform: rotateY(-180deg);
        }

        .envelope.opened .envelope-flap-right {
            transform: rotateY(180deg);
        }

        /* Envelope content */
        .envelope-content {
            position: absolute;
            top: 20%;
            left: 5%;
            right: 5%;
            bottom: 5%;
            background: white;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }

        .envelope-text {
            text-align: center;
            color: #d81b60;
            font-size: clamp(24px, 5vw, 32px);
            font-weight: bold;
        }

        .envelope-subtext {
            color: #ec407a;
            font-size: clamp(14px, 3vw, 18px);
            margin-top: 10px;
            font-style: italic;
        }

        .heart-icon {
            font-size: clamp(36px, 8vw, 48px);
            margin: 10px 0;
            animation: heartbeat 1.5s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 100% {
                transform: scale(1);
            }
            25% {
                transform: scale(1.1);
            }
            50% {
                transform: scale(1);
            }
        }

        .click-instruction {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            color: #d81b60;
            font-style: italic;
            font-size: clamp(14px, 3vw, 16px);
            animation: bounce 2s ease-in-out infinite;
            font-weight: bold;
            text-align: center;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateX(-50%) translateY(0);
            }
            50% {
                transform: translateX(-50%) translateY(-15px);
            }
        }
    </style>
</head>
<body>
    <div class="flowers" id="flowerContainer"></div>

    <div class="envelope-wrapper">
        <div style="width: 100%; display: flex; flex-direction: column; align-items: center;">
            <div class="envelope" id="envelope">
                <div class="envelope-body"></div>
                <div class="envelope-flap-left" id="flapLeft"></div>
                <div class="envelope-flap-right" id="flapRight"></div>
                <div class="envelope-content">
                    <div class="heart-icon">❤️</div>
                    <div class="envelope-text">For You</div>
                    <div class="envelope-subtext">with love</div>
                </div>
            </div>
            <div class="click-instruction">✨ Click to open ✨</div>
        </div>
    </div>

    <script>
        // Generate random flowers
        function generateFlowers() {
            const flowerContainer = document.getElementById('flowerContainer');
            const flowers = ['🌸', '🌼', '🌻', '🌷', '🌹', '💐'];
            
            for (let i = 0; i < 15; i++) {
                const flower = document.createElement('div');
                flower.className = 'flower';
                flower.textContent = flowers[Math.floor(Math.random() * flowers.length)];
                flower.style.left = Math.random() * 100 + '%';
                flower.style.top = Math.random() * 100 + '%';
                flower.style.animationDelay = Math.random() * 2 + 's';
                flower.style.opacity = Math.random() * 0.5 + 0.3;
                flowerContainer.appendChild(flower);
            }
        }

        // Handle envelope click
        document.getElementById('envelope').addEventListener('click', function() {
            this.classList.add('opened');
            
            // Redirect to letter page after animation
            setTimeout(() => {
                window.location.href = 'https://rawcdn.githack.com/amirah20022017-a11y/apology-letter/main/letter.html';
            }, 600);
        });

        // Generate flowers on page load
        window.addEventListener('load', generateFlowers);
    </script>
</body>
</html>
