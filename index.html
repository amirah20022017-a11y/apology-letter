<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Letter For You</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%);
            font-family: 'Georgia', serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .flowers {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 0;
        }

        .flower {
            position: absolute;
            font-size: 24px;
            opacity: 0.6;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .envelope-container {
            perspective: 1000px;
            position: relative;
            z-index: 1;
        }

        .envelope {
            width: 300px;
            height: 200px;
            background: linear-gradient(135deg, #fff9e6 0%, #ffe6f0 100%);
            border: 3px solid #d81b60;
            border-radius: 10px;
            position: relative;
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(236, 64, 122, 0.3);
            transition: all 0.3s ease;
        }

        .envelope:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 50px rgba(236, 64, 122, 0.5);
        }

        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(135deg, #ec407a 0%, #d81b60 100%);
            border-radius: 10px 10px 0 0;
            transform-origin: top center;
            transition: transform 0.6s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .envelope.opened .envelope-flap {
            transform: rotateX(180deg);
        }

        .envelope-content {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0 0 10px 10px;
            overflow: hidden;
        }

        .envelope-text {
            text-align: center;
            color: #d81b60;
            font-size: 24px;
        }

        .flap-heart {
            font-size: 32px;
            color: white;
        }

        .click-text {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            color: #d81b60;
            font-style: italic;
            font-size: 14px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateX(-50%) translateY(0);
            }
            50% {
                transform: translateX(-50%) translateY(-10px);
            }
        }

        .envelope-container.opened {
            pointer-events: none;
        }

        @media (max-width: 600px) {
            .envelope {
                width: 250px;
                height: 170px;
            }

            .flap-heart {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="flowers" id="flowerContainer"></div>

    <div class="envelope-container" id="envelopeContainer">
        <div class="envelope" id="envelope">
            <div class="envelope-flap">
                <span class="flap-heart">❤️</span>
            </div>
            <div class="envelope-content">
                <div class="envelope-text">For You</div>
            </div>
            <div class="click-text">Click to open</div>
        </div>
    </div>

    <script>
        // Generate random flowers
        function generateFlowers() {
            const flowerContainer = document.getElementById('flowerContainer');
            const flowers = ['🌸', '🌼', '🌻', '🌷', '🌹', '💐'];
            
            for (let i = 0; i < 15; i++) {
                const flower = document.createElement('div');
                flower.className = 'flower';
                flower.textContent = flowers[Math.floor(Math.random() * flowers.length)];
                flower.style.left = Math.random() * 100 + '%';
                flower.style.top = Math.random() * 100 + '%';
                flower.style.animationDelay = Math.random() * 2 + 's';
                flower.style.opacity = Math.random() * 0.5 + 0.3;
                flowerContainer.appendChild(flower);
            }
        }

        // Handle envelope click
        document.getElementById('envelope').addEventListener('click', function() {
            this.classList.add('opened');
            document.getElementById('envelopeContainer').classList.add('opened');
            
            // Redirect to letter page after animation using htmlpreview format
            setTimeout(() => {
                window.location.href = 'https://htmlpreview.github.io/?https://github.com/amirah20022017-a11y/apology-letter/blob/main/letter.html';
            }, 600);
        });

        // Generate flowers on page load
        window.addEventListener('load', generateFlowers);
    </script>
</body>
</html>
