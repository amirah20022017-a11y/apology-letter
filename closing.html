<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%);
            font-family: 'Georgia', serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .flowers {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 0;
        }

        .flower {
            position: absolute;
            font-size: 28px;
            opacity: 0.6;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .closing-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 60px 50px;
            max-width: 600px;
            box-shadow: 0 10px 40px rgba(236, 64, 122, 0.2);
            position: relative;
            z-index: 1;
            animation: slideIn 0.8s ease-out;
            text-align: center;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .closing-content {
            color: #333;
            line-height: 2;
            font-size: 18px;
            margin-bottom: 40px;
        }

        .closing-content p {
            margin-bottom: 25px;
            font-style: italic;
            color: #d81b60;
            font-weight: 500;
        }

        .heart-animation {
            font-size: 48px;
            margin: 20px 0;
            animation: heartbeat 1.3s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 100% {
                transform: scale(1);
            }
            25% {
                transform: scale(1.1);
            }
            50% {
                transform: scale(1);
            }
        }

        @media (max-width: 600px) {
            .closing-container {
                padding: 40px 30px;
            }

            .closing-content {
                font-size: 16px;
            }

            .heart-animation {
                font-size: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="flowers" id="flowerContainer"></div>

    <div class="closing-container">
        <div class="heart-animation">❤️</div>
        
        <div class="closing-content">
            <p>Thank you for every memory we made together.</p>
            <p>They'll always have a place in my heart.</p>
        </div>

        <div class="heart-animation">💕</div>
    </div>

    <script>
        // Generate random flowers
        function generateFlowers() {
            const flowerContainer = document.getElementById('flowerContainer');
            const flowers = ['🌸', '🌼', '🌻', '🌷', '🌹', '💐'];
            
            for (let i = 0; i < 20; i++) {
                const flower = document.createElement('div');
                flower.className = 'flower';
                flower.textContent = flowers[Math.floor(Math.random() * flowers.length)];
                flower.style.left = Math.random() * 100 + '%';
                flower.style.top = Math.random() * 100 + '%';
                flower.style.animationDelay = Math.random() * 2 + 's';
                flower.style.opacity = Math.random() * 0.5 + 0.3;
                flowerContainer.appendChild(flower);
            }
        }

        // Generate flowers on page load
        window.addEventListener('load', generateFlowers);
    </script>
</body>
</html>
